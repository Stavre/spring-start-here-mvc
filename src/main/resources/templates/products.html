<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Products</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <style> .product-card {
        min-height: 320px;
    }
    .product-image {
        height: 160px;
        object-fit: cover;
    } </style>
</head>
<body>
<header class="bg-light py-3 mb-4">
    <div class="container d-flex justify-content-between align-items-center"><h1 class="h4 mb-0">Shop</h1>
        <nav><a class="btn btn-outline-primary btn-sm" th:href="@{/cart}">View Cart</a></nav>
    </div>
</header>
<main class="container">
    <div class="row g-4">
        <div class="col-12 col-sm-6 col-md-4 col-lg-3" th:each="product : ${products}">
            <div class="card product-card h-100"><img class="card-img-top product-image" th:src="${product.imageUrl}"
                                                      th:alt="${product.name}"/>
                <div class="card-body d-flex flex-column"><h5 class="card-title" th:text="${product.name}">Product
                    Name</h5>
                    <p class="card-text mb-3"><strong>Price:</strong> <span class="text-success fw-bold"
                                                                            th:text="${product.price} + ' €'">0.00 €</span>
                    </p>
                    <div class="mt-auto">
                        <form th:action="@{/cart/add}" method="post" class="d-flex gap-2"><input type="hidden"
                                                                                                 name="productId"
                                                                                                 th:value="${product.id}"/>
                            <input type="hidden" name="quantity" value="1"/>
                            <button type="submit" class="btn btn-primary w-100"> Add to cart</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="no-products-message" th:if="${#lists.isEmpty(products)}" class="text-center text-muted my-5"> No products available.</div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
