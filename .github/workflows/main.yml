name: basic_check
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  build:
    name: basic_check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: setup java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
      - name: setup gradle
        uses: gradle/actions/setup-gradle@v4
      - name: compile code
        run: ./gradlew compileJava
      - name: run checkstyle
        run: ./gradlew checkstyleMain
      - name: run pmd
        run: ./gradlew pmdMain
      - name: run checkstyle test
        run: ./gradlew checkstyleTest
      - name: run pmd test
        run: ./gradlew pmdTest
      - name: build with gradle
        run: ./gradlew build
      - name: run unit tests
        run: ./gradlew test
      - name: run jacoco test coverage verification
        run: ./gradlew jacocoTestCoverageVerification